name: Download YouTube Playlist

on:
  workflow_dispatch:
    inputs:
      playlist_url:
        description: "YouTube Playlist URL"
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Download playlist
        run: |
          python downloader.py "${{ github.event.inputs.playlist_url }}"

      - name: Upload downloaded files
        uses: actions/upload-artifact@v4
        with:
          name: playlist-files
          path: downloads/
          retention-days: 7
